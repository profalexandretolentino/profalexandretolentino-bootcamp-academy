<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>

    <h1>Login do Sistema</h1>

    <form action="painel-admin.html">

        <fieldset>
            <legend>Entrar</legend>

            <label>Email:</label>
            <br>
            <input type="email" required placeholder="Digite seu email">

            <br><br>

            <label>Senha:</label>
            <br>
            <input type="password" required minlength="8" placeholder="Digite sua senha">

            <br><br>

            <button type="submit">Entrar</button>
            <button type="reset">Limpar</button>

        </fieldset>

    </form>

    <br>

    <a href="recuperar-senha.html">Esqueci minha senha</a>
    <br>
    <a href="cadastro-usuario.html">Criar conta</a>

</body>
</html>
