<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Pedido</title>
</head>
<body>

    <h1>Novo Pedido</h1>

    <form action="pedido-sucesso.html">

        <fieldset>
            <legend>Pedido</legend>

            <label>Cliente:</label>
            <br>
            <select>
                <option>João</option>
                <option>Maria</option>
            </select>

            <br><br>

            <label>Produto:</label>
            <br>
            <select>
                <option>Notebook</option>
                <option>Mouse</option>
            </select>

            <br><br>

            <label>Quantidade:</label>
            <br>
            <input type="number" min="1" required>

            <br><br>

            <label>Forma de Pagamento:</label>
            <br>

            <input type="radio" name="pagamento">
            Pix

            <br>

            <input type="radio" name="pagamento">
            Cartão

            <br><br>

            <label>Observações:</label>
            <br>
            <textarea></textarea>

            <br><br>

            <button type="submit">Finalizar Pedido</button>

        </fieldset>

    </form>
        <br>
    <a href="./painel-admin.html">Voltar ao menu</a>

</body>
</html>
