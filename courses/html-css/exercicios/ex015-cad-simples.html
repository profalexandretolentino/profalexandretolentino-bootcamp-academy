<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Básico</title>
</head>
<body>

    <h1>Cadastro Simples</h1>

    <form action="carrega-pagina-principal.html" method="post">

            <label for="nome">Nome:</label>
            <input 
                type="text" 
                id="nome" 
                name="nome" 
                required
                
            >
 
        <br>

        <div>
            <label for="email">E-mail:</label>
            <input 
                type="email" 
                id="email" 
                name="email" 
                required
                
            >
        </div>

        <br>

        <input type="submit" value="Enviar">

    </form>

</body>
</html>
