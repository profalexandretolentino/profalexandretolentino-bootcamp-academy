<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
</head>
<body>

    <h1>Login</h1>

    <form action="#" method="post">

   
            <label for="email">E-mail:</label>
            <input 
                type="email" 
                id="email" 
                name="email" 
                required
            >

        <br><br>

            <label for="senha">Senha:</label>
            <input 
                type="password" 
                id="senha" 
                name="senha" 
                required
            >

        <br><br>

            <input 
                type="checkbox" 
                id="lembrar" 
                name="lembrar"
            >
            

            <label for="lembrar">Lembrar-me</label>

        <br><br>

            <a href="./ex017-recuperar-senha.html">Esqueci minha senha</a>

        <br><br>

        <input type="submit" value="Fazer o login" />
  

    </form>

</body>
</html>
