<!-- Arquivo: recuperar-senha.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Configurações da página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título da página -->
    <title>Recuperação de Senha</title>
</head>
<body>

    <!-- Título principal -->
    <h1>Recuperação de Senha</h1>

    <!-- Início do formulário -->
    <form>

        <!-- Agrupamento dos campos -->
        <fieldset>

            <!-- Legenda do fieldset -->
            <legend>Dados para recuperação</legend>

            <!-- Campo de email -->
            <label for="email">E-mail:</label>
            <input 
                type="email"
                id="email"
                name="email"
                placeholder="Digite seu e-mail"
                required
            >

            <br><br>

            <!-- Campo de nova senha -->
            <label for="novaSenha">Nova Senha:</label>
            <input 
                type="password"
                id="novaSenha"
                name="novaSenha"
                placeholder="Digite a nova senha"
                required
                minlength="8"
                maxlength="20"
            >

            <br><br>

            <!-- Campo de confirmação da senha -->
            <label for="confirmarSenha">Confirmar Nova Senha:</label>
            <input 
                type="password"
                id="confirmarSenha"
                name="confirmarSenha"
                placeholder="Confirme a nova senha"
                required
                minlength="8"
                maxlength="20"
            >

            <br><br>

            <!-- Botão para alterar senha -->
            <button type="submit">
                Alterar Senha
            </button>

            <!-- Botão para limpar formulário -->
            <button type="reset">
                Limpar Formulário
            </button>

        </fieldset>

    </form>

    <br>

    <!-- Link para voltar ao login -->
    <a href="./ex016-login.html">
        Voltar ao Login
    </a>

</body>
</html>
