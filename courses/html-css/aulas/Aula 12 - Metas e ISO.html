<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Isto insere um comentário no HTML -->
    <meta http-equiv="refresh" content="30"> 
    <!-- Uma tag <meta> que atualiza a página da web a cada 30 segundos.-->
    <!-- define a codificação de caracteres do documento HTML-->
    <meta name="title" content="Aula de Programação Web do Prof. Alexandre"> 
    <!--Uma tag <meta> que define o título da página. Muito importante para SEO (Search Engine Optimization)-->
    <meta name="description" content="Site especializado no ensino de HTML, CSS, JS, Web Design"> 
    <!-- Uma tag <meta> com uma breve descrição sobre o que é a página.-->
    <meta name="keywords" content="HTML, CSS, Bootstrap, JS, aulas, Prof.Alexandre, ensino, javascript, programação"> 
    <!-- Uma tag <meta> com palavras-chave associadas à página. 
    As palavras-chave são separadas por vírgulas. -->
    <meta name="author" content="Menorah Digital - Prof. Alexandre"> 
    <!--Uma tag <meta> que especifica o autor da página. Pode ser uma pesosa ou uma empresa-->

    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <!-- Uma tag <meta> que define a área visível do usuário da página de acordo com o tamanho do dispositivo.-->
        
    <!--A meta tag viewport informa ao navegador como controlar as dimensões e o dimensionamento da página da web.
        width=device-width - define a largura da página da web para seguir a largura da tela do dispositivo
        initial-scale=1.0 - define o nível de zoom inicial quando a página é carregada pela primeira vez  -->

    <link rel="icon" href="./img/Pizza-icon_30282.ico"> <!-- Insere o icone na aba do navgador -->
    <title>Aula MetaTags e Head</title>
</head>
<body>
    
    <h1>Aula sobre meta dados, charset, ISO e mais</h1>

    <h2>Tabela de abrevia&ccedil;&atilde;o - ISO 639-1:2002</h2>
    <img src="img/iso 639-1 languages list.jpg" alt="">
 

    <h2>Tabela de abreviação - ISO 3166-1 alpha2</h2>
    <iframe src="https://datahub.io/core/country-list/r/0.html" width="100%" height="100%" frameborder="0"></iframe>


    <h2>Referência a Tabela ASCII e o UTF-8</h2>
    <a href="https://tableless.com.br/charsets-e-encodes-tabelas-de-caracteres/">Matéria no Tableless</a>

    
</body>
</html>
