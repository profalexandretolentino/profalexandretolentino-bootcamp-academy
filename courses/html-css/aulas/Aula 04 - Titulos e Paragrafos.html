<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />

        <title>Aula Titulos e Paragrafos</title>
        <style> /*CSS Interno ou Incorporado*/
            h1{
                color:blue;
            }
            h2,h3{
                color:green;
            }
            p{
                color:gold;
            }
        </style>
        <link rel="stylesheet" href="css/estilo.css">
    </head>
    <body>
        <h1>Meu Título</h1>
        <h2>Meu Subtítulo</h2>
        <h3>Meu Tópico</h3>
        <h4>Meu Tópico</h4> <!-- CSS Inline -->
        <h5>Meu Tópico</h5>
        <h6>Meu Tópico</h6>    
        <p style="color:red;">Meu Parágrafo</p>
        <p style="color:aqua;" id="p1" class="impar">Paragrafo</p>
        <p id="p2" class="par">Paragrafo</p>
        <p id="p3" class="impar">Paragrafo</p>
        <p id="p4" class="par">Paragrafo</p>
        <p id="p5" class="impar">Paragrafo</p>
        <p id="p6" class="par">Paragrafo</p>
        <p id="p7" class="impar">Paragrafo</p>
        <p id="p8" class="par">Paragrafo</p>
        <p id="p9" class="impar">Paragrafo</p>
        <p id="p10" class="par">Paragrafo</p>
    </body>
</html>
