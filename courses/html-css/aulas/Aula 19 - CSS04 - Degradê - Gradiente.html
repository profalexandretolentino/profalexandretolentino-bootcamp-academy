<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Aula CSS4</title>
        <link rel="stylesheet" href="css/19-gradiente.css">
    </head>
    <body>
        <h1>Aula de div e Gradiente (Degradê)</h1>
        ex imagem Transparência<br/>
        <img src="img/degrade/gradiente-degrade.jfif" alt="degrade">


        <h2>Explicação</h2>
        <img src="img/degrade/angulos-do-gradiente.png" alt="explicação css gradiente">
        teste
        <div id="grad-teste"></div>
        <br/>

        <hr/>
        <h2>20 Tipos de Gradientes</h2>

        <h2>Linear</h2>
        <label>0 graus</label>
        <div id="grad1">1</div>
        <label>90 graus</label>
        <div id="grad2">2</div>
        <label>135 graus</label>
        <div id="grad3">3</div>
        <label>-105 graus</label>
        <div id="grad4">4</div><br/><br/>
        <label>Para direita</label>
        <div id="grad5">5</div>
        <label>Para esquerda</label>
        <div id="grad6">6</div>
        <label>Para cima</label>
        <div id="grad7">7</div>
        <label>Para baixo</label>
        <div id="grad8">8</div><br/><br/>
        <label>Com Transparência</label>
        <div id="grad15">9</div>
        <label>Arco-Iris</label>
        <div id="grad16">10</div><br/><br/>
        <br/><br/><hr/>
        
        
        <h2>Radial</h2>
        <label>Radial</label>
        <div id="grad9">11</div>
        <label>Radial circular</label>
        <div id="grad10">12</div>
        <br/><br/><hr/>

        <h2>Conicos</h2>
        <label>Com uma posição central especificada</label>
        <div id="grad17">13</div>
        <label>com variações no grau de cada cor</label>
        <div id="grad18">14</div><br/><br/>
        <label>Basta adicionar border-radius 50% para fazer o gradiente cônico parecer uma torta</label>
        <div id="grad19">15</div>
        <br/><br/><hr/>


        <h2>Repetições</h2>
        <label>Repetindo linear 20%</label>
        <div id="grad11">16</div>
        <label>Repetindo radial 50%</label>
        <div id="grad12">17</div>
        <label>Repetindo conico 50%</label>
        <div id="grad20">18</div>
        <br/><br/><hr/>


        <h2>Combinando o fundo com uma imagem</h2>
        <label>Imagem com degradê repetindo em X - horizontal</label>
        <div id="grad13">19</div>
        <br/><br/>

        <label>Imagem com degradê repetindo em Y - vertical</label>
        <div id="grad14">20</div>


    </body>
